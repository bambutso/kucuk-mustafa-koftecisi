<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Test 4 — clip sarmalayıcı</title>
    <style>
      html {
        color-scheme: dark;
        background-color: #141110;
      }
      body {
        margin: 0;
        background-color: #1b1b1b;
        color: #f7f2ea;
        font-family: system-ui, sans-serif;
        line-height: 1.6;
      }
      .wrap {
        position: relative;
        overflow-x: clip;
      }
      .blok {
        height: 60vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        text-align: center;
      }
      .turuncu {
        background: linear-gradient(160deg, #d9772f, #b87333);
        color: #141110;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="blok">TEST 4 — içerik, sitedeki gibi overflow-x:clip sarmalayıcının içinde.</div>
      <div class="blok turuncu">Turuncu blok çubuğun altından akıyor mu?</div>
      <div class="blok">Koyu blok.</div>
      <div class="blok turuncu">Turuncu blok 2.</div>
      <div class="blok">Son blok.</div>
    </div>
  </body>
</html>
