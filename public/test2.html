<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Test 2 — JS ile dolan sayfa</title>
    <style>
      html {
        color-scheme: dark;
        background-color: #141110;
      }
      body {
        margin: 0;
        background-color: #1b1b1b;
        color: #f7f2ea;
        font-family: system-ui, sans-serif;
        line-height: 1.6;
      }
      .blok {
        height: 60vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        text-align: center;
      }
      .turuncu {
        background: linear-gradient(160deg, #d9772f, #b87333);
        color: #141110;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      document.getElementById("root").innerHTML = `
        <div class="blok">TEST 2 — içerik sayfa yüklendikten sonra JS ile eklendi (React gibi).</div>
        <div class="blok turuncu">Turuncu blok çubuğun altından akıyor mu?</div>
        <div class="blok">Koyu blok.</div>
        <div class="blok turuncu">Turuncu blok 2.</div>
        <div class="blok">Son blok.</div>`;
    </script>
  </body>
</html>
