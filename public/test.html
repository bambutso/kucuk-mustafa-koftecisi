<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Kaydırma Testi</title>
    <style>
      html {
        color-scheme: dark;
        background-color: #141110;
      }
      body {
        margin: 0;
        background-color: #1b1b1b;
        color: #f7f2ea;
        font-family: system-ui, sans-serif;
        line-height: 1.6;
      }
      .blok {
        height: 60vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
      }
      .turuncu {
        background: linear-gradient(160deg, #d9772f, #b87333);
        color: #141110;
      }
    </style>
  </head>
  <body>
    <div class="blok">Bu bir test sayfası — aşağı kaydır.</div>
    <div class="blok turuncu">
      Bu turuncu blok adres çubuğunun ALTINDAN akıyorsa test başarılı.
    </div>
    <div class="blok">Koyu blok.</div>
    <div class="blok turuncu">Turuncu blok yine çubuğun altından geçmeli.</div>
    <div class="blok">Son blok. Sonucu Claude'a söyle.</div>
  </body>
</html>
